<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NextOCR Khmer - ទម្រង់ក្រដាស A4</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        /* កូដ CSS សម្រាប់កំណត់ទម្រង់បោះពុម្ពជាក្រដាស A4 */
        @media print {
            body * {
                visibility: hidden;
            }
            #printArea, #printArea * {
                visibility: visible;
            }
            #printArea {
                position: absolute;
                left: 0;
                top: 0;
                width: 210mm; /* ទទឹងក្រដាស A4 */
                min-height: 297mm; /* កម្ពស់ក្រដាស A4 */
                padding: 20mm;
                font-family: 'Khmer OS Battambang', 'Courier New', monospace;
                font-size: 12pt;
                line-height: 1.6;
                white-space: pre-wrap; /* រក្សាបន្ទាត់ និងការចុះជួរ */
                background: white;
                color: black;
            }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">

    <header class="bg-blue-600 text-white shadow-md pt-6 pb-4 px-4 sticky top-0 z-50 no-print">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-wide">NextOCR A4</h1>
                <p class="text-[10px] text-blue-200">ស្រង់ទិន្នន័យរក្សាបន្ទាត់ទម្រង់ A4</p>
            </div>
            <span class="text-xs bg-blue-700/60 px-2.5 py-1 rounded-full border border-blue-400/30 font-mono">v2.0.0</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4 pb-16 no-print">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200/60">
            <label for="langSelect" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">១. ជ្រើសរើសភាសាក្នុងរូបភាព</label>
            <select id="langSelect" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm font-semibold text-gray-700">
                <option value="khm">ភាសាខ្មែរ (Khmer)</option>
                <option value="eng">ភាសាអង់គ្លេស (English)</option>
                <option value="khm+eng">ខ្មែរ និង អង់គ្លេស រួមគ្នា</option>
            </select>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200/60 space-y-4">
            <span class="block text-xs font-bold text-gray-400 uppercase tracking-wider">២. ជ្រើសរើសរូបភាពឯកសារ</span>
            
            <label for="imageInput" class="w-full flex flex-col items-center justify-center h-44 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:bg-gray-50 active:bg-gray-100/70 transition-all">
                <div class="flex flex-col items-center justify-center text-center px-4">
                    <div class="bg-blue-50 p-3 rounded-full mb-3 text-blue-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <p class="text-sm font-bold text-gray-700">ចុចទីនេះដើម្បីជ្រើសរើសឯកសាររូបភាព</p>
                    <p class="text-xs text-gray-400 mt-1">ប្រព័ន្ធនឹងស្រង់យកគ្រប់បន្ទាត់អក្សរ</p>
                </div>
                <input id="imageInput" type="file" accept="image/*" class="hidden" />
            </label>
            
            <div id="previewContainer" class="hidden border-t border-gray-100 pt-4">
                <p class="text-xs font-bold text-gray-400 mb-2">រូបភាពដែលបានជ្រើសរើស៖</p>
                <div class="relative rounded-xl overflow-hidden border border-gray-200 shadow-sm max-h-52 flex justify-center bg-gray-50">
                    <img id="imagePreview" src="#" alt="Preview" class="object-contain max-h-52 w-full">
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200/60 flex flex-col space-y-3">
            <div class="flex justify-between items-center">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">៣. លទ្ធផលទទួលបាន (អត្ថបទតាមបន្ទាត់)</h3>
                <span id="statusText" class="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md">រង់ចាំរូបភាព...</span>
            </div>
            
            <div id="progressContainer" class="hidden w-full bg-gray-100 rounded-full h-2 overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-indigo-600 h-2 rounded-full transition-all duration-150" style="width: 0%"></div>
            </div>

            <div class="relative">
                <textarea id="resultText" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-gray-700 text-sm min-h-[200px] shadow-inner font-mono whitespace-pre" placeholder="អត្ថបទនឹងបង្ហាញតាមជួរ និងបន្ទាត់ច្បាស់លាស់នៅទីនេះ..." readonly></textarea>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <button id="copyBtn" class="bg-gray-800 text-white font-bold py-3 rounded-xl shadow-sm active:scale-[0.98] transition flex justify-center items-center gap-2 text-xs">
                    ចម្លងអត្ថបទ (Copy)
                </button>
                <button id="printBtn" class="bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md active:scale-[0.98] transition flex justify-center items-center gap-2 text-xs">
                    រក្សាទុកជា A4 (PDF)
                </button>
            </div>
        </div>
    </main>

    <div id="printArea" class="hidden font-mono whitespace-pre"></div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewContainer = document.getElementById('previewContainer');
        const resultText = document.getElementById('resultText');
        const statusText = document.getElementById('statusText');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const langSelect = document.getElementById('langSelect');
        const copyBtn = document.getElementById('copyBtn');
        const printBtn = document.getElementById('printBtn');
        const printArea = document.getElementById('printArea');

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                imagePreview.src = event.target.result;
                previewContainer.classList.remove('hidden');
                processOCR(event.target.result);
            }
            reader.readAsDataURL(file);
        });

        function processOCR(imageSrc) {
            statusText.innerText = "កំពុងរៀបចំ...";
            statusText.className = "text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md";
            progressContainer.classList.remove('hidden');
            resultText.value = "";
            printArea.innerText = "";
            progressBar.style.width = "0%";

            Tesseract.recognize(
                imageSrc,
                langSelect.value,
                { 
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            const progress = Math.round(m.progress * 100);
                            progressBar.style.width = progress + '%';
                            statusText.innerText = `កំពុងស្រង់បន្ទាត់អក្សរ... ${progress}%`;
                        }
                    }
                }
            ).then(({ data: { text } }) => {
                statusText.innerText = "ជោគជ័យ!";
                statusText.className = "text-xs font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-md";
                progressContainer.classList.add('hidden');
                
                if (text.trim() === "") {
                    resultText.value = "[រកមិនឃើញបន្ទាត់អត្ថបទទេ]";
                } else {
                    // រក្សាទុកទិន្នន័យទាំងបន្ទាត់ៗ
                    resultText.value = text;
                    printArea.innerText = text; 
                }
            }).catch(err => {
                console.error(err);
                statusText.innerText = "បរាជ័យ!";
                statusText.className = "text-xs font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded-md";
                progressContainer.classList.add('hidden');
                resultText.value = "មានកំហុសបច្ចេកទេសក្នុងការស្រង់ទិន្នន័យ។";
            });
        }

        // មុខងារ Copy
        copyBtn.addEventListener('click', () => {
            if (!resultText.value || resultText.value.startsWith('[')) return;
            navigator.clipboard.writeText(resultText.value);
            alert("បានចម្លងអត្ថបទទាំងបន្ទាត់រួចរាល់!");
        });

        // មុខងារបោះពុម្ព ឬរក្សាទុកជា PDF ទម្រង់ក្រដាស A4
        printBtn.addEventListener('click', () => {
            if (!printArea.innerText) {
                alert("មិនទាន់មានទិន្នន័យសម្រាប់បោះពុម្ព ឬរក្សាទុកឡើយ!");
                return;
            }
            window.print();
        });
    </script>
</body>
</html>
